name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build backend
        run: python -m pip install setuptools
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Show product manifest
        run: python -m tokensquash about --json
      - name: Show release metadata
        run: python -m tokensquash release-info --json
      - name: Initialize sample workspace
        run: python -m tokensquash init --root /tmp/tokensquash-workspace --json
      - name: Run install doctor
        run: python -m tokensquash doctor
      - name: Run strict install doctor
        run: python -m tokensquash doctor --strict --strict-out-dir /tmp/tokensquash-doctor-strict
      - name: Run public demo
        run: python -m tokensquash demo --counter chars --out-dir /tmp/tokensquash-demo
      - name: Gate public demo turn evaluation
        run: python -m tokensquash turns gate /tmp/tokensquash-demo/turn-evaluation/evaluation.json --min-saved-pct 0.5 --max-privacy-findings 0
      - name: Certify public demo turn corpus
        run: python -m tokensquash turns certify examples/sample-turns.jsonl --counter chars --out-dir /tmp/tokensquash-certification
      - name: Plan public quality budget init
        run: python -m tokensquash budget init --out /tmp/tokensquash-quality-budget.json --dry-run --json
      - name: Validate public quality budget
        run: python -m tokensquash budget validate examples/quality-budget.json
      - name: Compare public demo certifications
        run: python -m tokensquash turns compare-certifications /tmp/tokensquash-certification/certification.json /tmp/tokensquash-certification/certification.json
      - name: Summarize public demo certification history
        run: python -m tokensquash turns certification-history /tmp/tokensquash-certification /tmp/tokensquash-certification
      - name: Run public demo release check
        run: python -m tokensquash turns release-check examples/sample-turns.jsonl --counter chars --budget examples/quality-budget.json --history /tmp/tokensquash-certification --out-dir /tmp/tokensquash-release-check
      - name: Verify public demo release evidence
        run: python -m tokensquash turns verify-release /tmp/tokensquash-release-check --require-release-pass
      - name: Run product readiness evidence pack
        run: python -m tokensquash readiness --skip-tests --out-dir /tmp/tokensquash-readiness --json
      - name: Verify product readiness evidence pack
        run: python -m tokensquash verify-readiness /tmp/tokensquash-readiness --require-readiness-pass --json
      - name: Build package wheel
        run: python -m pip wheel . --no-deps -w /tmp/tokensquash-wheel
      - name: Check packaged demo data
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("/tmp/tokensquash-wheel").glob("tokensquash-*.whl"))
          with ZipFile(wheel) as zf:
              assert "tokensquash/data/sample-turns.jsonl" in set(zf.namelist())
          PY
      - name: Build source distribution
        run: |
          mkdir -p /tmp/tokensquash-sdist
          python - <<'PY'
          import os
          import setuptools.build_meta as build_meta

          print(build_meta.build_sdist(os.path.relpath("/tmp/tokensquash-sdist", os.getcwd())))
          PY
      - name: Check source distribution demo data
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          sdist = next(Path("/tmp/tokensquash-sdist").glob("tokensquash-*.tar.gz"))
          with tarfile.open(sdist, "r:gz") as archive:
              names = {item.name for item in archive.getmembers() if item.isfile()}
          assert any(name.endswith("/tokensquash/data/sample-turns.jsonl") for name in names)
          assert any(name.endswith("/PKG-INFO") for name in names)
          PY
      - name: Run sample benchmark
        run: python -m tokensquash bench examples/coding-prompts.jsonl
      - name: Run reply codec smoke test
        run: |
          python -m tokensquash reply encode --summary "added compact reply codec" --file tokensquash/reply.py --verify "unit tests pass" --risk none
          python -m tokensquash reply decode "tr1 d compact reply added f=tokensquash/reply.py v=unit tests pass r=none"
      - name: Run reply benchmark
        run: python -m tokensquash reply bench examples/agent-replies.jsonl
      - name: Run reply pattern mine
        run: python -m tokensquash reply mine examples/agent-replies.jsonl
      - name: Run reply alias learner
        run: |
          python -m tokensquash reply aliases examples/agent-replies.jsonl --out /tmp/tokensquash-aliases.json
          python -m tokensquash reply bench examples/agent-replies.jsonl --aliases /tmp/tokensquash-aliases.json
      - name: Run turn corpus workflow
        run: |
          python -m tokensquash turns add --out /tmp/tokensquash-real.jsonl --prompt "fix login" --reply "Done. I fixed login and ran tests." --verify "unit tests pass"
          python -m tokensquash turns validate examples/real-turns.template.jsonl
          python -m tokensquash turns measure examples/real-turns.template.jsonl --target 0
          python -m tokensquash turns diagnose examples/real-turns.template.jsonl
          python -m tokensquash turns mine examples/real-turns.template.jsonl
          python -m tokensquash turns aliases examples/real-turns.template.jsonl --out /tmp/tokensquash-turn-aliases.json
          python -m tokensquash turns alias-impact examples/real-turns.template.jsonl --target 0
          python -m tokensquash turns bench examples/real-turns.template.jsonl
          python -m tokensquash turns split examples/real-turns.template.jsonl --prompts-out /tmp/tokensquash-prompts.jsonl --replies-out /tmp/tokensquash-replies.jsonl
      - name: Validate messy corpus
        run: python -m tokensquash corpus validate examples/messy-coding-prompts.jsonl
      - name: Show messy corpus stats
        run: python -m tokensquash corpus stats examples/messy-coding-prompts.jsonl
      - name: Run messy benchmark
        run: python -m tokensquash bench examples/messy-coding-prompts.jsonl
      - name: Verify dependency-free benchmark baselines
        run: python -m tokensquash baselines verify --json
      - name: Compare committed exact-tokenizer baselines
        run: python -m tokensquash compare benchmarks/messy-cl100k.json benchmarks/messy-o200k.json
      - name: Compare committed reply baselines
        run: python -m tokensquash compare benchmarks/replies-cl100k.json benchmarks/replies-o200k.json

  exact-tokenizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install tokenizer extra
        run: python -m pip install setuptools -e ".[tokenizer]"
      - name: Verify exact-tokenizer benchmark baselines
        run: python -m tokensquash baselines verify --include-exact-tokenizer --json
      - name: Run release candidate gate
        run: python -m tokensquash release-candidate --skip-tests --out-dir /tmp/tokensquash-release-candidate --json
      - name: Verify release candidate gate
        run: python -m tokensquash verify-release-candidate /tmp/tokensquash-release-candidate --require-release-candidate-pass --out /tmp/tokensquash-release-candidate-verify.json --json
      - name: Assert release package evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          pack = Path("/tmp/tokensquash-release-candidate")
          verify_path = Path("/tmp/tokensquash-release-candidate-verify.json")
          candidate = json.loads((pack / "release-candidate.json").read_text(encoding="utf-8"))
          verify = json.loads(verify_path.read_text(encoding="utf-8"))
          steps = {step["name"]: step for step in candidate["steps"]}
          checks = {check["name"]: check for check in verify["checks"]}
          expectations = {
              "candidate.status": candidate.get("status"),
              "verify.status": verify.get("status"),
              "steps.exact_tokenizer_baselines": steps["exact_tokenizer_baselines"]["status"],
              "steps.wheel_build": steps["wheel_build"]["status"],
              "steps.wheel_smoke": steps["wheel_smoke"]["status"],
              "steps.sdist_build": steps["sdist_build"]["status"],
              "checks.wheel": checks["wheel"]["status"],
              "checks.sdist": checks["sdist"]["status"],
              "checks.artifact_manifest_integrity": checks["artifact_manifest_integrity"]["status"],
              "summary.wheel_smoke_status": verify["summary"]["wheel_smoke_status"],
              "summary.sdist_status": verify["summary"]["sdist_status"],
          }
          failures = {key: value for key, value in expectations.items() if value != "pass"}
          if failures:
              raise SystemExit(f"Release package evidence did not pass: {failures}")
          for relative in (
              "artifact-manifest.json",
              "artifact-manifest.md",
              "release-attestation.json",
              "release-attestation.md",
              "wheel-build.txt",
              "wheel-smoke.txt",
              "sdist-build.txt",
          ):
              path = pack / relative
              if not path.exists() or path.stat().st_size <= 0:
                  raise SystemExit(f"Missing or empty release evidence artifact: {path}")
          PY
      - name: Collect release candidate evidence
        if: always()
        run: |
          rm -rf ci-release-candidate-evidence
          mkdir -p ci-release-candidate-evidence
          if [ -d /tmp/tokensquash-release-candidate ]; then
            cp -R /tmp/tokensquash-release-candidate ci-release-candidate-evidence/release-candidate
          fi
          if [ -f /tmp/tokensquash-release-candidate-verify.json ]; then
            cp /tmp/tokensquash-release-candidate-verify.json ci-release-candidate-evidence/verify-release-candidate.json
          fi
      - name: Upload release candidate evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-candidate-evidence
          path: ci-release-candidate-evidence
          if-no-files-found: warn
      - name: Run exact tokenizer benchmark
        run: python -m tokensquash bench examples/messy-coding-prompts.jsonl --counter tiktoken:cl100k_base
      - name: Run exact tokenizer reply benchmark
        run: python -m tokensquash reply bench examples/agent-replies.jsonl --counter tiktoken:cl100k_base
      - name: Run exact tokenizer reply mine
        run: python -m tokensquash reply mine examples/agent-replies.jsonl --counter tiktoken:cl100k_base
      - name: Run exact tokenizer turn benchmark
        run: python -m tokensquash turns bench examples/real-turns.template.jsonl --counter tiktoken:cl100k_base --target 0
      - name: Run exact tokenizer turn diagnose
        run: python -m tokensquash turns diagnose examples/real-turns.template.jsonl --counter tiktoken:cl100k_base
      - name: Run exact tokenizer turn mine
        run: python -m tokensquash turns mine examples/real-turns.template.jsonl --counter tiktoken:cl100k_base
      - name: Run exact tokenizer alias impact
        run: python -m tokensquash turns alias-impact examples/real-turns.template.jsonl --counter tiktoken:cl100k_base --target 0
